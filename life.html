<!DOCTYPE HTML>
<html lang="zh-CN">
	<head>
		<title>生活点滴 - 小白的小窝</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
		<style>
			body { background: #f5f0e8 !important; }
			#header h1 {
				font-size: 2.4em;
				font-weight: 800;
				letter-spacing: 0.04em;
				background: linear-gradient(120deg, #ff6b9d 0%, #c44cff 40%, #6e8efb 80%, #00d4aa 100%);
				-webkit-background-clip: text;
				-webkit-text-fill-color: transparent;
				background-clip: text;
				filter: drop-shadow(0 2px 8px rgba(196,76,255,0.3));
			}
			.back-link {
				display: inline-block;
				margin-bottom: 1.5em;
				color: #888;
				text-decoration: none;
				font-size: 0.95em;
			}
			.back-link:hover { color: #c44cff; }
			.photo-grid {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
				gap: 24px;
				max-width: 900px;
				margin: 0 auto;
			}
			.photo-card {
				background: #fff;
				border-radius: 16px;
				overflow: hidden;
				box-shadow: 0 4px 16px rgba(0,0,0,0.1);
				transition: transform 0.3s ease;
			}
			.photo-card:hover { transform: translateY(-4px); }
			.photo-card img {
				width: 100%;
				height: 280px;
				object-fit: cover;
				display: block;
			}
			.photo-card .caption {
				padding: 1em 1.2em;
				text-align: center;
				color: #888;
				font-size: 0.95em;
			}
			.photo-card .desc {
				padding: 0 1.2em 1.2em;
				text-align: center;
				color: #aaa;
				font-size: 0.85em;
				margin-top: 0;
			}
		</style>
	</head>
	<body class="is-preload">

		<div id="wrapper" style="padding: 4em 2em;">

			<a href="index.html" class="back-link">← 返回首页</a>

			<header class="major" style="text-align:center;margin-bottom:3em;">
				<h2>🌿 生活点滴</h2>
				<p>记录日常的每一份美好</p>
			</header>

			<div class="photo-grid">
				<div class="photo-card">
					<img src="images/selfie_coffee.jpg" alt="咖啡时光" />
					<div class="caption">☕ 咖啡时光</div>
					<p class="desc">偷得浮生半日闲，一杯咖啡一段故事</p>
				</div>
				<div class="photo-card">
					<img src="images/selfie_sunset.jpg" alt="落日余晖" />
					<div class="caption">🌅 落日余晖</div>
					<p class="desc">夕阳西下，天边染成一片金红</p>
				</div>
				<div class="photo-card">
					<img src="images/selfie_green.jpg" alt="绿野仙踪" />
					<div class="caption">🌿 绿野仙踪</div>
					<p class="desc">走进大自然，感受绿意盎然的生命力</p>
				</div>
			</div>

		</div>

	</body>
</html>
